<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>造物协会 · 改造龙人/兽人档案库</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="bg-grid"></div>
    <div class="container">
        <h1>造物协会 · 改造龙人/兽人档案库</h1>
        <div class="tips">
            <strong>TIPS：</strong>本档案为造物协会最高机密级实验体记录，包含创伤、改造、能力与背景信息，仅供内部查阅。
        </div>
        <!-- 角色卡片列表 -->
        <div class="card-list">
            <!-- GZT001 金鳌 -->
            <a href="gzt001.html" class="unit-card" style="--accent-color: #ffd700;">
                <img src="https://redstone2337.netlify.app/images/SocietyofCreators.png" alt="GZT001" class="unit-avatar">
                <div class="unit-info">
                    <div class="unit-code">GZT001</div>
                    <h3 class="unit-name">金鳌</h3>
                    <p class="unit-race">金色龙人（五爪金龙后裔）</p>
                    <span class="unit-status status-contained">Contained</span>
                </div>
            </a>
            <!-- GZDL001 紫弧 -->
            <a href="gzdl001.html" class="unit-card" style="--accent-color: #9933ff;">
                <img src="https://redstone2337.netlify.app/images/SocietyofCreators.png" alt="GZDL001" class="unit-avatar">
                <div class="unit-info">
                    <div class="unit-code">GZDL001</div>
                    <h3 class="unit-name">紫弧</h3>
                    <p class="unit-race">紫电龙人</p>
                    <span class="unit-status status-active">Active</span>
                </div>
            </a>
            <!-- GZL001 苍獠 -->
            <a href="gzl001.html" class="unit-card" style="--accent-color: #ff4444;">
                <img src="https://redstone2337.netlify.app/images/SocietyofCreators.png" alt="GZL001" class="unit-avatar">
                <div class="unit-info">
                    <div class="unit-code">GZL001</div>
                    <h3 class="unit-name">苍獠</h3>
                    <p class="unit-race">狼龙融合改造体（赛博强化）</p>
                    <span class="unit-status status-active">Active</span>
                </div>
            </a>

            <!-- RZDL001 穆璃 -->
            <a href="rzdl001.html" class="unit-card" style="--accent-color: #66ccff;">
                <img src="https://redstone2337.netlify.app/images/SocietyofCreators.png" alt="RZDL001" class="unit-avatar">
                <div class="unit-info">
                    <div class="unit-code">RZDL001</div>
                    <h3 class="unit-name">穆璃</h3>
                    <p class="unit-race">琉璃龙人</p>
                    <span class="unit-status status-active">Active</span>
                </div>
            </a>


        </div>
        <!-- 快捷新建角色HTML工具 -->
        <div class="generator-section">
            <h2>📝 快捷HTML创建工具</h2>
            <p>填写信息 → 点击生成 → 复制代码 → 保存为对应文件名.html 即可新增角色</p>
            <form id="generatorForm">
                <div class="form-grid">
                    <input type="text" id="fileName" placeholder="文件名(例: gzt002.html)" required>
                    <input type="text" id="unitCode" placeholder="角色编号(例: GZT002)" required>
                    <input type="text" id="unitName" placeholder="角色本名(例: 金鳌)" required>
                    <input type="color" id="accentColor" value="#ffd700" required>
                    <input type="url" id="avatarUrl" placeholder="卡片头像URL" required>
                    <input type="text" id="unitRace" placeholder="种族/身份" required>
                    <select id="unitStatus" required>
                        <option value="Active">Active</option>
                        <option value="Contained">Contained</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="details" style="color: #88aaff; margin-bottom: 0.5rem; display: block;">基础信息（JSON格式）</label>
                    <textarea id="details" required>{"身份":"","改造状态":"","核心改造":"","能力":"","眼睛特征":""}</textarea>
                </div>
                <div class="form-group">
                    <label for="bio" style="color: #88aaff; margin-bottom: 0.5rem; display: block;">背景故事</label>
                    <textarea id="bio" required placeholder="填写角色完整背景"></textarea>
                </div>
                <div class="form-group">
                    <label for="avatarImgUrl" style="color: #88aaff; margin-bottom: 0.5rem; display: block;">角色立绘URL（详情页默认隐藏）</label>
                    <input type="url" id="avatarImgUrl" placeholder="立绘图片网络URL" required>
                </div>
                <button type="submit" class="btn-generate">生成HTML代码</button>
            </form>
            <textarea class="code-output" id="codeOutput" readonly placeholder="生成后的代码会显示在这里"></textarea>
        </div>
    </div>
    <script src="js/common.js"></script>
</body>
</html>
