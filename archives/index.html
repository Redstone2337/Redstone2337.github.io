<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>造物协会 · 角色档案库</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei",sans-serif;background:#0b101e;color:#e0e6f0;padding:30px 20px;position:relative;overflow-x:hidden}
body::before{content:"";position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 20% 30%,rgba(79,195,255,0.08)0%,transparent 20%),radial-gradient(circle at 70% 70%,rgba(120,80,255,0.06)0%,transparent 15%);pointer-events:none;z-index:-1;animation:bgShift 25s infinite linear}
@keyframes bgShift{0%{transform:translate(0,0)}50%{transform:translate(10px,-10px)}100%{transform:translate(0,0)}}
.container{max-width:1000px;margin:0 auto}
.page-title{text-align:center;font-size:32px;color:#4fc3ff;margin-bottom:10px;letter-spacing:3px}
.page-sub{text-align:center;color:#89a6d1;margin-bottom:16px;font-size:16px}
.tips{text-align:center;background:#18223b;border:1px solid #2a3a5f;border-radius:8px;padding:12px 16px;margin-bottom:30px;color:#a0bce4;font-size:14px}
.role-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px}
.role-card{background:#121a2f;border:1px solid #2a3a5f;border-radius:12px;padding:24px;position:relative;overflow:hidden;transition:transform 0.3s,box-shadow 0.3s;text-decoration:none}
.role-card::before{content:"";position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(79,195,255,0.08),transparent);animation:flow 6s infinite linear}
@keyframes flow{0%{left:-100%}100%{left:100%}}
.role-card:hover{transform:translateY(-6px);box-shadow:0 10px 30px rgba(79,195,255,0.15);border-color:#4fc3ff}
.code{font-size:14px;color:#4fc3ff;margin-bottom:8px}
.name{font-size:20px;font-weight:bold;color:#fff;margin-bottom:8px}
.desc{font-size:14px;color:#a0bce4}
</style>
</head>
<body>
<div class="container">
  <div class="page-title">造物协会</div>
  <div class="page-sub">SBERI · 融合兽角色档案库</div>

  <!-- 新增 TIPS 提示 -->
  <div class="tips">
    💡 TIPS：深空生物工程研究院隶属于造物协会旗下的工程研究院。
  </div>

  <div class="role-list">
    <a href="gzl001.html" class="role-card">
      <div class="code">GZL001</div>
      <div class="name">狼龙兽人</div>
      <div class="desc">灰狼×青龙·星际探索先锋</div>
    </a>
    <a href="rzdl001.html" class="role-card">
      <div class="code">RZDL001</div>
      <div class="name">青毒龙侍</div>
      <div class="desc">木毒双生·人造毒龙一号</div>
    </a>
  </div>
</div>
</body>
</html>
